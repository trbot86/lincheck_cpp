name: ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: gcc
            cxx: g++
          - name: clang
            cxx: clang++

    steps:
      - uses: actions/checkout@v4

      - name: Install compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ clang git

      - name: Fetch patched Multiverse target
        run: |
          mkdir -p upstream
          git clone https://gitlab.com/Coccimiglio/mvcc_tm.git upstream/mvcc_tm
          git -C upstream/mvcc_tm checkout 0d1454cb7d902d6534cb79dc788f08395906bb44
          git -C upstream/mvcc_tm submodule update --init --recursive
          git -C upstream/mvcc_tm apply --unidiff-zero ../../third_party/mvcc_tm-lincheck-hooks.patch

      - name: Configure
        run: cmake -S . -B build -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}

      - name: Build
        run: cmake --build build -j2

      - name: Test
        run: ctest --test-dir build --output-on-failure
